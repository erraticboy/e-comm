# Render manifest for e-comm

services:
  - type: web
    name: e-comm-server
    env: node
    region: oregon
    branch: main
    repo: https://github.com/erraticboy/e-comm
    root: server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    envVars:
      - key: MONGODB_URI
        value: ""
      - key: STRIPE_SECRET_KEY
        value: ""
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: JWT_SECRET
        value: ""

static_sites:
  - name: e-comm-client
    repo: https://github.com/erraticboy/e-comm
    branch: main
    root: .
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
